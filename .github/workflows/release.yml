name: Release

on:
  workflow_run:
    workflows: ['Pull Request']
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  route:
    name: Route release
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      publish: ${{ steps.route.outputs.publish }}
    steps:
      - name: Identify the merged pull request
        id: route
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          head_ref="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            "/repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/pulls" \
            --jq '[.[] | select(.merged_at != null)] | sort_by(.merged_at) | reverse | .[0].head.ref // ""')"

          if [[ "$head_ref" == "changeset-release/main" ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

  version-pr:
    name: Update release pull request
    needs: route
    if: needs.route.outputs.publish != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout verified revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-pnpm
        with:
          ignore-scripts: 'true'

      - name: Create or update release pull request
        uses: changesets/action@c48e67d110a68bc90ccf1098e9646092baacaa87
        with:
          version: pnpm run release:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish packages
    needs: route
    if: needs.route.outputs.publish == 'true'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout verified revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 11.11.0

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: '24'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies without lifecycle scripts
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify npm version
        run: npm --version

      - name: Publish packages
        run: pnpm run release:publish
        env:
          NPM_CONFIG_PROVENANCE: 'true'
