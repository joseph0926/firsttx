name: e2e-playwright

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e:
    name: e2e-${{ matrix.suite.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: smoke
            testArgs: tests/home.smoke.spec.ts
          - name: metrics
            testArgs: tests/prepaint-heavy.spec.ts tests/instant-cart.metrics.spec.ts tests/sync-staleness.spec.ts tests/tx-concurrent.metrics.spec.ts
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 11.11.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build FirstTx packages
        run: pnpm --filter @firsttx/shared --filter @firsttx/prepaint --filter @firsttx/local-first --filter @firsttx/tx build

      - name: Validate metric contracts
        if: matrix.suite.name == 'metrics'
        run: pnpm --filter playground test:contract

      - name: Install Playwright browsers (Chromium)
        run: pnpm --filter playground exec playwright install chromium --with-deps

      - name: Run Playwright tests
        run: pnpm --filter playground test:e2e ${{ matrix.suite.testArgs }}

      - name: Run Docs Playwright smoke
        if: matrix.suite.name == 'smoke'
        run: pnpm --filter @firsttx/docs test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: playwright-report-${{ matrix.suite.name }}
          path: apps/playground/playwright-report
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Playwright test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: playwright-test-results-${{ matrix.suite.name }}
          path: apps/playground/test-results
          if-no-files-found: ignore

      - name: Upload Docs Playwright report
        if: ${{ !cancelled() && matrix.suite.name == 'smoke' }}
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: docs-playwright-report
          path: apps/docs/playwright-report
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Docs Playwright test results
        if: ${{ !cancelled() && matrix.suite.name == 'smoke' }}
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: docs-playwright-test-results
          path: apps/docs/test-results
          if-no-files-found: ignore
          retention-days: 30
