name: Playground Metrics

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/playground/**'
      - 'packages/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup environment
        uses: ./.github/actions/setup-pnpm

      - name: Build FirstTx packages
        run: pnpm run build --filter='./packages/*'

      - name: Run Playwright metrics suite
        working-directory: apps/playground
        run: |
          pnpm exec playwright install --with-deps
          pnpm test:e2e tests/prepaint-heavy.spec.ts tests/instant-cart.metrics.spec.ts tests/tx-concurrent.metrics.spec.ts

      - name: Copy metrics to public/
        working-directory: apps/playground
        run: pnpm metrics:sync

      - name: Upload metrics artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: playground-metrics
          path: |
            apps/playground/.metrics/*.json
            apps/playground/public/metrics/*.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with:
          path: apps/playground/public/metrics

  deploy:
    needs: metrics
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
