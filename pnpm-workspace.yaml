packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  sharp: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@turbo/darwin-64@2.10.5'
  - '@turbo/darwin-arm64@2.10.5'
  - '@turbo/linux-64@2.10.5'
  - '@turbo/linux-arm64@2.10.5'
  - '@turbo/windows-64@2.10.5'
  - '@turbo/windows-arm64@2.10.5'
  - turbo@2.10.5
overrides:
  'vite': '^7.3.1'
  'rollup': '^4.54.0'
  'react': '^19.2.4'
  'react-dom': '^19.2.4'
  '@types/react': '^19.2.10'
  '@types/react-dom': '^19.2.3'
  'sharp@<0.35.0': '0.35.3'
